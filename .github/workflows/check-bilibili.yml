name: 检查B站新视频

on:
  schedule:
  - cron: '0 1-15 * * *'
  - cron: '30 1-15 * * *'
  - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  check-new-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Node 依赖
        run: npm install

      - name: 安装 yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 安装 ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: 安装 faster-whisper
        run: python -m pip install faster-whisper

      # 关键：缓存路径必须和 Python 脚本里的一致
      - name: 缓存 Whisper 模型
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/ctranslate2
          key: whisper-model-base-${{ runner.os }}
          restore-keys: |
            whisper-model-base-

      - name: 检查新视频并分析
        env:
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          BILI_UID: ${{ secrets.BILI_UID }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: node scripts/analyze-video.js --check-new

      - name: 提交更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/videos.json
          if ! git diff --staged --quiet; then
            git commit -m "📊 更新视频分析数据 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "没有新数据，跳过提交"
          fi

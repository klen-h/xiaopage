name: 检查B站新视频

on:
  schedule:
    # 北京时间9:00-24:00每半小时执行（UTC时间1:00-16:00）
    - cron: '0,30 1-16 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  check-new-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许提交更改

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 安装 yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 检查新视频并分析
        env:
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          BILI_UID: ${{ secrets.BILI_UID }}
        run: node scripts/analyze-video.js --check-new

      - name: 提交更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/videos.json
          git diff --staged --quiet || git commit -m "📊 更新视频分析数据 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git push
